<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/img/doge.jpg" />
<link rel="stylesheet" href="/assets/css/ubar.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* بەشی تابەکان */
    .chrome-tabs {
        display: flex;
        background: #111;
        padding: 5px 10px 0;
        gap: 5px;
        height: 35px; /* بەرزی تابەکان */
        border-bottom: 1px solid #222;
        flex-shrink: 0;
    }
    .chrome-tab {
        background: #222;
        color: #777;
        padding: 5px 20px;
        border-radius: 8px 8px 0 0;
        border: none;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-size: 12px;
        transition: 0.3s;
    }
    .chrome-tab.active {
        background: #333;
        color: #fff;
    }

    /* بەشی بارەکە - لێرە ڕێکم خستووەتەوە */
    #urlBar {
        display: flex !important;
        align-items: center;
        background: #333;
        padding: 0 15px;
        height: 50px; /* بەرزی بارەکە */
        flex-shrink: 0;
        position: relative !important;
        z-index: 10;
        gap: 10px;
    }

    /* شوێنی نووسینی لینکەکە */
    #urlInput {
        flex: 1;
        background: #111;
        border: 1px solid #444;
        color: #fff;
        padding: 8px 15px;
        border-radius: 20px;
        outline: none;
    }

    /* بەشی پیشاندانی سایتەکان */
    .iframe-wrapper {
        flex: 1; /* هەموو ئەوەی دەمێنێتەوە بۆ ئایفریم بێت */
        width: 100%;
        background: #000;
        position: relative;
    }

    .browser-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
    }
    .browser-frame.active {
        display: block;
    }
</style>
<script src="/assets/js/anym.js"></script>
<script>
    let currentTab = 1;

    window.onload = function () {
        let encodedUrl = localStorage.getItem("encodedUrl");
        let fullUrl = "/service/" + encodedUrl;
        
        document.getElementById("siteurl").src = fullUrl;
        document.getElementById("siteurl2").src = fullUrl;

        history.pushState({}, "Google Docs", "/student?auth=doge" + Math.floor(Math.random() * 999));
    };

    function switchTab(num) {
        currentTab = num;
        document.querySelectorAll('.chrome-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + num).classList.add('active');

        document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
        if(num === 1) {
            document.getElementById('siteurl').classList.add('active');
        } else {
            document.getElementById('siteurl2').classList.add('active');
        }
    }

    function loadNewUrl() {
        let input = document.getElementById("urlInput").value;
        if(!input) return;
        let proxied = "/service/" + btoa(input).replace(/\//g, "_").replace(/\+/g, "-").replace(/=/g, "");
        
        if(currentTab === 1) {
            document.getElementById('siteurl').src = proxied;
        } else {
            document.getElementById('siteurl2').src = proxied;
        }
    }
</script>
<title>Doge | Fixed Layout</title>
</head>
<body>

<!-- ١. تابەکان -->
<div class="chrome-tabs">
    <button class="chrome-tab active" id="tab1" onclick="switchTab(1)">Tab 1</button>
    <button class="chrome-tab" id="tab2" onclick="switchTab(2)">Tab 2</button>
</div>

<!-- ٢. بارەکەی سەرەوە (URL Bar) -->
<div id="urlBar">
  <input type="text" id="urlInput" placeholder="Search Google or type a URL" onkeydown="if(event.key==='Enter') loadNewUrl()" />
  <i class="bi bi-search" style="color: white; cursor: pointer;" onclick="loadNewUrl()"></i>
  <button class="bi bi-arrows-fullscreen" style="background:none; border:none; color:white; cursor:pointer;" onclick="toggleFs()"></button>
  <button class="bi bi-arrow-clockwise" style="background:none; border:none; color:white; cursor:pointer;" onclick="location.reload()"></button>
  <button class="bi bi-box-arrow-right" style="background:none; border:none; color:white; cursor:pointer;" onclick="window.location.href='/'"></button>
</div>

<!-- ٣. ئایفریمەکان -->
<div class="iframe-wrapper">
    <iframe src="loading.html" id="siteurl" class="browser-frame active"></iframe>
    <iframe src="loading.html" id="siteurl2" class="browser-frame"></iframe>
</div>

<script src="/uv/uv.handler.js"></script>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/assets/js/loader.js"></script>
</body>
</html>
