<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/img/doge.jpg" />
<link rel="stylesheet" href="/assets/css/ubar.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    /* ستایلی تابەکان وەک کرۆم */
    .chrome-tabs-container {
        display: flex;
        background: #111;
        padding: 5px 10px 0;
        gap: 4px;
        border-bottom: 1px solid #333;
    }
    .chrome-tab {
        background: #222;
        color: #888;
        padding: 8px 15px;
        border-radius: 8px 8px 0 0;
        border: none;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-size: 12px;
        min-width: 100px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: 0.2s;
    }
    .chrome-tab.active {
        background: #333;
        color: #fff;
        border-bottom: 2px solid #007bff;
    }
    .iframe-container {
        height: calc(100vh - 95px); /* جێگای تابەکان و بارەکە */
        width: 100%;
        position: relative;
    }
    .browser-frame {
        display: none;
        width: 100%;
        height: 100%;
        border: none;
    }
    .browser-frame.active {
        display: block;
    }
</style>
<script src="/assets/js/anym.js"></script>
<script>
    let currentTab = 1;

    window.onload = function () {
        let encodedUrl = localStorage.getItem("encodedUrl");
        let fullUrl = "/service/" + encodedUrl;
        
        // بارکردنی یەکەم سایت لە هەردوو تابەکەدا بۆ سەرەتا
        document.querySelector("#frame1").src = fullUrl;
        document.querySelector("#frame2").src = fullUrl;

        // URL Cloaking (وەک خۆی مۆدێلەکەی تۆ)
        history.pushState({}, "Google Docs", "/student?auth=" + Math.random().toString(36).substring(7));
    };

    function switchTab(num) {
        currentTab = num;
        // گۆڕینی ستایلی دوگمەکان
        document.querySelectorAll('.chrome-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t' + num).classList.add('active');
        
        // نیشاندانی تەنها یەک تاب
        document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
        document.getElementById('frame' + num).classList.add('active');
    }

    function loadNewUrl() {
        let val = document.getElementById("urlInput").value;
        if(!val) return;
        // ئێرە فەرمانی UV بەکاردێنێت بۆ Encode کردن
        let proxied = "/service/" + btoa(val).replace(/\//g, "_").replace(/\+/g, "-").replace(/=/g, "");
        document.getElementById('frame' + currentTab).src = proxied;
    }
</script>
<title>Doge | Multi-Tab</title>
</head>
<body>

<!-- بەشی تابەکان -->
<div class="chrome-tabs-container">
    <button class="chrome-tab active" id="t1" onclick="switchTab(1)">
        <i class="bi bi-globe"></i> Tab 1
    </button>
    <button class="chrome-tab" id="t2" onclick="switchTab(2)">
        <i class="bi bi-globe"></i> Tab 2
    </button>
</div>

<div id="urlBar">
  <input type="text" id="urlInput" placeholder="Search or type URL" class="navsearch" onkeydown="if(event.key==='Enter') loadNewUrl()" />
  <i class="bi bi-search search" onclick="loadNewUrl()"></i>
  <button class="bi bi-arrow-clockwise reload" onclick="document.getElementById('frame' + currentTab).contentWindow.location.reload()"></button>
  <button class="bi bi-box-arrow-right exit" onclick="window.location.href='/'"></button>
  <!-- دوگمەکانی تری خۆت لێرە زیاد بکەرەوە -->
</div>

<div class="iframe-container">
    <iframe src="loading.html" id="frame1" class="browser-frame active"></iframe>
    <iframe src="loading.html" id="frame2" class="browser-frame"></iframe>
</div>

 <script src="/uv/uv.handler.js"></script>
 <script src="/uv/uv.bundle.js"></script>
 <script src="/uv/uv.config.js"></script>
 <script src="/assets/js/loader.js"></script>
</body>
</html>
