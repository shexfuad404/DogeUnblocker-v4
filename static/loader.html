<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/img/doge.jpg" />
<link rel="stylesheet" href="/assets/css/ubar.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    /* چاککردنی جێگای تابەکان و بارەکە */
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    
    .chrome-tabs {
        display: flex;
        background: #111;
        padding: 8px 10px 0;
        gap: 5px;
        border-bottom: 1px solid #222;
        height: 40px;
    }
    .chrome-tab {
        background: #222;
        color: #777;
        padding: 8px 18px;
        border-radius: 8px 8px 0 0;
        border: none;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-size: 12px;
        transition: 0.3s;
    }
    .chrome-tab.active {
        background: #333;
        color: #fff;
        font-weight: bold;
    }

    #urlBar {
        position: relative !important;
        top: 0 !important;
        display: flex;
        align-items: center;
        background: #333;
        padding: 5px;
        height: 45px;
    }

    .iframe-wrapper {
        height: calc(100vh - 95px);
        width: 100%;
        background: #000;
    }

    /* ئەم بەشە زۆر گرنگە بۆ ئەوەی سپی نەبێت */
    .browser-frame {
        width: 100%;
        height: 100%;
        border: none;
        display: none;
    }
    .browser-frame.active {
        display: block;
    }
</style>
<script src="/assets/js/anym.js"></script>
<script>
    let currentTab = 1;

    window.onload = function () {
        let encodedUrl = localStorage.getItem("encodedUrl");
        let fullUrl = "/service/" + encodedUrl;
        
        // دانانی لینکەکان
        document.getElementById("siteurl").src = fullUrl; // تاب 1
        document.getElementById("siteurl2").src = fullUrl; // تاب 2

        // URL Cloaking
        history.pushState({}, "Google Docs", "/student?auth=doge" + Math.floor(Math.random() * 999));
    };

    function switchTab(num) {
        currentTab = num;
        document.querySelectorAll('.chrome-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab' + num).classList.add('active');

        document.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
        // فێڵەکە لێرەدایە: تابی یەکەم ناوی 'siteurl'ە تا loader.js نەیبڕێت
        if(num === 1) {
            document.getElementById('siteurl').classList.add('active');
        } else {
            document.getElementById('siteurl2').classList.add('active');
        }
    }

    function loadNewUrl() {
        let input = document.getElementById("urlInput").value;
        if(!input) return;
        // ئینکۆدکردنی یو ئاڕ ئێڵ وەک Doge
        let proxied = "/service/" + btoa(input).replace(/\//g, "_").replace(/\+/g, "-").replace(/=/g, "");
        
        if(currentTab === 1) {
            document.getElementById('siteurl').src = proxied;
        } else {
            document.getElementById('siteurl2').src = proxied;
        }
    }
</script>
<title>Doge | V4 Fixed</title>
</head>
<body>

<!-- بەشی تابەکان (Chrome Style) -->
<div class="chrome-tabs">
    <button class="chrome-tab active" id="tab1" onclick="switchTab(1)">Tab 1</button>
    <button class="chrome-tab" id="tab2" onclick="switchTab(2)">Tab 2</button>
</div>

<!-- بارەکەی خۆت بە هەموو دوگمەکانەوە -->
<div id="urlBar">
  <input type="text" id="urlInput" placeholder="Search Google or type a URL" class="navsearch" onkeydown="if(event.key==='Enter') loadNewUrl()" />
  <i class="bi bi-search search" onclick="loadNewUrl()"></i>
  <button class="bi bi-arrows-fullscreen fs" onclick="toggleFs()"></button>
  <button class="bi bi-arrow-clockwise reload" onclick="location.reload()"></button>
  <button class="bi bi-box-arrow-right exit" onclick="window.location.href='/'"></button>
</div>

<!-- بەشی ئایفریمەکان -->
<div class="iframe-wrapper">
    <!-- ئایفریمی یەکەم ناوی 'siteurl'ە بۆ ئەوەی loader.js ئیش بکات -->
    <iframe src="loading.html" id="siteurl" class="browser-frame active"></iframe>
    <iframe src="loading.html" id="siteurl2" class="browser-frame"></iframe>
</div>

<script src="/uv/uv.handler.js"></script>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/assets/js/loader.js"></script>
</body>
</html>
